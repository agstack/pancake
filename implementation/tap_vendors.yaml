# TAP Vendor Configuration
# =========================
# This file defines all registered TAP vendors and their adapters.
# Add new vendors here to enable plug-and-play integration.

vendors:
  # Terrapipe - Satellite Imagery (NDVI)
  - vendor_name: terrapipe_ndvi
    adapter_class: tap_adapters.TerrapipeNDVIAdapter
    base_url: https://appserver.terrapipe.io
    auth_method: api_key
    credentials:
      secretkey: ${TERRAPIPE_SECRET}
      client: ${TERRAPIPE_CLIENT}
    sirup_types:
      - satellite_imagery
    rate_limit:
      max_requests: 100
      time_window: 60  # seconds
    timeout: 60
    metadata:
      description: "Sentinel-2 satellite imagery with NDVI index"
      resolution: "10m"
      coverage: "Global"
      update_frequency: "5-7 days"
      data_types: ["NDVI", "vegetation health", "crop vigor"]
  
  # ISRIC SoilGrids - Global Soil Data
  - vendor_name: soilgrids
    adapter_class: tap_adapters.SoilGridsAdapter
    base_url: https://rest.isric.org/soilgrids/v2.0
    auth_method: none
    credentials: {}
    sirup_types:
      - soil_profile
      - soil_infiltration
    rate_limit:
      max_requests: 50
      time_window: 60
    timeout: 60
    metadata:
      description: "Global soil property maps at 250m resolution"
      resolution: "250m"
      coverage: "Global"
      data_types: ["soil texture", "pH", "organic carbon", "bulk density", "infiltration rate"]
      reference: "https://www.isric.org/explore/soilgrids"
  
  # Terrapipe - Weather Forecast (GFS)
  - vendor_name: terrapipe_weather
    adapter_class: tap_adapters.TerrapipeGFSAdapter
    base_url: https://api.terrapipe.io
    auth_method: bearer_token
    credentials:
      email: ${TERRAPIPE_EMAIL}
      password: ${TERRAPIPE_PASSWORD}
      secretkey: ${TERRAPIPE_GFS_SECRET}
      client: ${TERRAPIPE_GFS_CLIENT}
    sirup_types:
      - weather_forecast
    rate_limit:
      max_requests: 100
      time_window: 60
    timeout: 60
    metadata:
      description: "NOAA GFS weather forecast data"
      resolution: "0.25 degrees (~25km)"
      coverage: "Global"
      forecast_range: "0-16 days"
      data_types: ["temperature", "precipitation", "humidity", "wind speed", "pressure"]

  - vendor_name: johndeere
    adapter_class: tap_adapters.johndeere_adapter.JohnDeereAdapter
    base_url: https://sandboxapi.deere.com/platform
    auth_method: oauth2
    timeout: 30
    token_url: https://signin.johndeere.com/oauth2/aus78av9p4u0uW7sj357/v1/token
    credentials:
      client_id: ${DEERE_CLIENT_ID}
      client_secret: ${DEERE_CLIENT_SECRET}
      access_token: ${DEERE_ACCESS_TOKEN}
      refresh_token: ${DEERE_REFRESH_TOKEN}
    sirup_types:
      - custom
    metadata:
      description: "Production-ready John Deere integration with auto-refresh."

  - vendor_name: newholland
    adapter_class: tap_adapters.cnh_industrial_adapter.CNHIndustrialAdapter
    base_url: https://api.cnhindustrial.com/platform
    auth_method: oauth2
    credentials:
      client_id: ${CNH_CLIENT_ID}
      client_secret: ${CNH_CLIENT_SECRET}
    sirup_types:
      - custom
    metadata:
      description: "Production-ready chn  integration with auto-refresh."


  - vendor_name: climate_fieldview
    adapter_class: tap_adapters.fieldview_adapter.FieldViewAdapter
    base_url: https://platform.climate.com/v4
    auth_method: oauth2
    credentials:
      client_id: ${CLIMATE_CLIENT_ID}
      client_secret: ${CLIMATE_CLIENT_SECRET}
      api_key: ${CLIMATE_API_KEY}


  - vendor_name: usda_nass
    adapter_class: tap_adapters.usda_nass_adapter.USDANASSAdapter
    base_url: http://quickstats.nass.usda.gov/api/api_GET
    auth_method: api_key
    credentials:
      api_key: ${USDA_NASS_API_KEY}
    sirup_types:
      - market_price
    metadata:
      description: "Production-ready usda  integration with auto-refresh."

  - vendor_name: leaf_aggregator
    adapter_class: tap_adapters.leaf_adapter.LeafAdapter
    base_url: http://api.withleaf.io/services/inventory/api
    auth_method: api_key
    credentials:
      api_key: ${LEAF_API_KEY}
    sirup_types:
      - custom
    metadata:
      description: "Production-ready leaf  integration with auto-refresh."

  - vendor_name: noaa_weather
    adapter_class: tap_adapters.noaa_weather_adapter.NOAAWeatherAdapter
    base_url: http://api.weather.gov
    auth_method: public
    sirup_types:
      - weather_data
    metadata:
      description: "Production-ready noaa  integration with auto-refresh."

  - vendor_name: raven_slingshot
    adapter_class: tap_adapters.raven_slingshot.RavenSlingshotAdapter
    base_url: ${RAVEN_BASE_URL}
    auth_method: custom_hmac
    credentials:
      api_key: ${RAVEN_API_KEY}
      shared_secret: ${RAVEN_SHARED_SECRET}
      access_key: ${RAVEN_ACCESS_KEY}
    sirup_types:
      - oem_data
    metadata:
      description: "Production-ready raven  integration with auto-refresh."

  - vendor_name: usda_arms
    adapter_class: tap_adapters.usda_arms_adapter.USDAArmsAdapter
    base_url: http://api.ers.usda.gov/data/arms
    auth_method: api_key
    credentials:
      api_key: ${USDA_ERS_KEY}
    sirup_types:
      - financial_benchmark
    metadata:
      description: "Production-ready usda_arms  integration with auto-refresh."

  - vendor_name: soil_data
    adapter_class: tap_adapters.soil_data_adapter.SoilDataAdapter
    base_url: https://SDMDataAccess.sc.egov.usda.gov/Tabular/post.rest
    auth_method: none
    sirup_types:
      - soil_data
    metadata:
      description: "USDA NRCS Soil Data Access (SDA) for organic matter and mapunit data."

# Vendor Integration Guidelines
# ==============================
# 
# To add a new vendor:
# 
# 1. Create adapter class (inherit from TAPAdapter)
#    - Implement get_vendor_data()
#    - Implement transform_to_sirup()
#    - Implement sirup_to_bite()
# 
# 2. Add vendor config here:
#    - vendor_name: unique identifier
#    - adapter_class: module.ClassName
#    - base_url: API endpoint
#    - auth_method: api_key | oauth2 | bearer_token | none
#    - credentials: auth details (use ${ENV_VAR} for secrets)
#    - sirup_types: list of supported SIRUP types
#    - rate_limit: throttling config
#    - metadata: human-readable description
# 
# 3. Set environment variables for credentials
# 
# 4. Test with: factory.get_adapter('your_vendor')
# 
# That's it! Your vendor is now integrated into TAP.

