services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pancake
      POSTGRES_USER: pancake
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pancake-dev-only}
    ports:
      - "5433:5432"
    volumes:
      - pancake_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pancake"]
      interval: 5s
      timeout: 3s
      retries: 10

  grants:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://pancake:${POSTGRES_PASSWORD:-pancake-dev-only}@postgres:5432/pancake
      PANCAKE_ISSUER_KEY: ${PANCAKE_ISSUER_KEY:?set PANCAKE_ISSUER_KEY in .env}
      PANCAKE_ISSUER_ID: ${PANCAKE_ISSUER_ID:-did:web:pancake.agstack.org}
      HUB_JWKS_URL: ${HUB_JWKS_URL:-http://host.docker.internal:8000/.well-known/jwks.json}
      HUB_URL: ${HUB_URL:-}
      STATUS_LIST_URI: ${STATUS_LIST_URI:-http://localhost:8100/grants/status-list}
    ports:
      - "8100:8100"

volumes:
  pancake_pgdata:
